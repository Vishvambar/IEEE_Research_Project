<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" style="background-color: white; font-family: Arial, sans-serif;">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#333" />
</marker>
<marker id="arrow_red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#E53935" />
</marker>
<linearGradient id="grad_input" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#f5f7fa" /><stop offset="100%" stop-color="#c3cfe2" /></linearGradient>
<linearGradient id="grad_trunk" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#e0c3fc" /><stop offset="100%" stop-color="#8ec5fc" /></linearGradient>
<linearGradient id="grad_head" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#d4fc79" /><stop offset="100%" stop-color="#96e6a1" /></linearGradient>
<linearGradient id="grad_out" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fdfbfb" /><stop offset="100%" stop-color="#ebedee" /></linearGradient>
<filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/></filter>
</defs>
<text x="500" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#111">Multi-Task Learning DAG Architecture</text>
<rect x="40" y="240" width="160" height="80" rx="15" ry="15" fill="url(#grad_input)" filter="url(#shadow)" stroke="#444" stroke-width="2"/><text x="120.0" y="270.0" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#222" font-weight="bold">Input Features</text><text x="120.0" y="290.0" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#222" >(17-D Vector)</text>
<rect x="280" y="240" width="180" height="80" rx="15" ry="15" fill="url(#grad_trunk)" filter="url(#shadow)" stroke="#444" stroke-width="2"/><text x="370.0" y="270.0" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#222" font-weight="bold">Shared Global Trunk</text><text x="370.0" y="290.0" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#222" >(64-D Latent State)</text>
<line x1="200" y1="280" x2="280" y2="280" stroke="#333" stroke-width="3"  marker-end="url(#arrow)"/>
<rect x="560" y="100" width="160" height="60" rx="15" ry="15" fill="url(#grad_head)" filter="url(#shadow)" stroke="#444" stroke-width="2"/><text x="640.0" y="120.0" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#222" font-weight="bold">Diabetes Head</text><text x="640.0" y="140.0" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#222" >(32-D Hidden)</text>
<ellipse cx="880" cy="130" rx="80" ry="30" fill="url(#grad_out)" filter="url(#shadow)" stroke="#444" stroke-width="2"/><text x="880" y="120" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#222" font-weight="bold">Diabetes</text><text x="880" y="140" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#222" >Prediction</text>
<path d="M 460 280 C 560 280, 460 130, 560 130" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="720" y1="130" x2="800" y2="130" stroke="#333" stroke-width="3"  marker-end="url(#arrow)"/>
<rect x="560" y="200" width="160" height="60" rx="15" ry="15" fill="url(#grad_head)" filter="url(#shadow)" stroke="#444" stroke-width="2"/><text x="640.0" y="220.0" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#222" font-weight="bold">CHF Head</text><text x="640.0" y="240.0" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#222" >(32-D Hidden)</text>
<ellipse cx="880" cy="230" rx="80" ry="30" fill="url(#grad_out)" filter="url(#shadow)" stroke="#444" stroke-width="2"/><text x="880" y="220" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#222" font-weight="bold">CHF</text><text x="880" y="240" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#222" >Prediction</text>
<path d="M 460 280 C 560 280, 460 230, 560 230" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="720" y1="230" x2="800" y2="230" stroke="#333" stroke-width="3"  marker-end="url(#arrow)"/>
<rect x="560" y="300" width="160" height="60" rx="15" ry="15" fill="url(#grad_head)" filter="url(#shadow)" stroke="#444" stroke-width="2"/><text x="640.0" y="320.0" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#222" font-weight="bold">Sepsis Head</text><text x="640.0" y="340.0" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#222" >(32-D Hidden)</text>
<ellipse cx="880" cy="330" rx="80" ry="30" fill="url(#grad_out)" filter="url(#shadow)" stroke="#444" stroke-width="2"/><text x="880" y="320" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#222" font-weight="bold">Sepsis</text><text x="880" y="340" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#222" >Prediction</text>
<path d="M 460 280 C 560 280, 460 330, 560 330" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="720" y1="330" x2="800" y2="330" stroke="#333" stroke-width="3"  marker-end="url(#arrow)"/>
<rect x="560" y="400" width="160" height="60" rx="15" ry="15" fill="url(#grad_head)" filter="url(#shadow)" stroke="#444" stroke-width="2"/><text x="640.0" y="420.0" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#222" font-weight="bold">AKI Head</text><text x="640.0" y="440.0" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#222" >(32-D Hidden)</text>
<ellipse cx="880" cy="430" rx="80" ry="30" fill="url(#grad_out)" filter="url(#shadow)" stroke="#444" stroke-width="2"/><text x="880" y="420" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#222" font-weight="bold">AKI</text><text x="880" y="440" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#222" >Prediction</text>
<path d="M 460 280 C 560 280, 460 430, 560 430" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="720" y1="430" x2="800" y2="430" stroke="#333" stroke-width="3"  marker-end="url(#arrow)"/>
<line x1="640" y1="160" x2="640" y2="200" stroke="#E53935" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrow_red)"/><rect x="645.0" y="165.0" width="110" height="30" fill="white" opacity="0.8" rx="5"/><text x="700.0" y="180.0" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold" fill="#E53935">Stop-Gradient</text>
<line x1="640" y1="260" x2="640" y2="300" stroke="#E53935" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrow_red)"/><rect x="645.0" y="265.0" width="110" height="30" fill="white" opacity="0.8" rx="5"/><text x="700.0" y="280.0" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold" fill="#E53935">Stop-Gradient</text>
<line x1="640" y1="360" x2="640" y2="400" stroke="#E53935" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrow_red)"/><rect x="645.0" y="365.0" width="110" height="30" fill="white" opacity="0.8" rx="5"/><text x="700.0" y="380.0" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold" fill="#E53935">Stop-Gradient</text>
</svg>